<!DOCTYPE html>
<html>
<head>
    <title>Создать заказ</title>
</head>
<body>
    <h1>Создание заказа</h1>
    <form method="POST">
        <p>Клиент:
            <select name="client_id" id="client_id" required>
                <option value="">Выберите клиента</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.full_name }} ({{ client.phone }})</option>
                {% endfor %}
            </select>
        </p>
        <p>Автомобиль:
            <select name="car_id" id="car_id" required>
                <option value="">Сначала выберите клиента</option>
            </select>
        </p>
        <p>Мастер:
            <select name="employee_id">
                <option value="">Не назначен</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.full_name }} ({{ emp.position }})</option>
                {% endfor %}
            </select>
        </p>
        <p>Описание проблемы:

            <textarea name="problem_description" rows="5" cols="50" required></textarea>
        </p>
        <p>Стоимость: <input type="number" step="0.01" name="total_price" value="0"></p>
        <button type="submit">Создать заказ</button>
        <a href="/orders">Отмена</a>
    </form>

    <script>
        document.getElementById('client_id').addEventListener('change', function() {
            var clientId = this.value;
            var carSelect = document.getElementById('car_id');
            if (clientId) {
                fetch('/get_cars/' + clientId)
                    .then(response => response.json())
                    .then(data => {
                        carSelect.innerHTML = '<option value="">Выберите автомобиль</option>';
                        data.forEach(car => {
                            var option = document.createElement('option');
                            option.value = car.id;
                            option.textContent = car.brand + ' ' + car.model + ' (' + (car.plate_number || 'без номера') + ')';
                            carSelect.appendChild(option);
                        });
                    });
            } else {
                carSelect.innerHTML = '<option value="">Сначала выберите клиента</option>';
            }
        });
    </script>
</body>
</html>
